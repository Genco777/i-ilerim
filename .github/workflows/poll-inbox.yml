name: Poll Zoho inbox → Telegram

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

concurrency:
  group: poll-inbox
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/mail/poll-inbox
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not set in this repo"
            exit 1
          fi
          response=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://admin.fly-froth.com/api/mail/poll-inbox")
          echo "HTTP $response"
          cat /tmp/body.txt
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            exit 1
          fi
