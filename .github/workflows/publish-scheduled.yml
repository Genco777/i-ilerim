name: Publish Scheduled Posts

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish check
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://admin.fly-froth.com/api/cron/publish-scheduled"
